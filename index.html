  items.forEach(function(it){var r=document.getElementById('r'+it._id);if(r)r.classList.toggle('hq',qty[it._id]>0)});
}
function chg(id,d){qty[id]=Math.max(0,(qty[id]||0)+d);var inp=document.getElementById('q'+id);if(inp)inp.value=qty[id];upd()}
function sq(id,v){qty[id]=Math.max(0,parseInt(v)||0);upd()}

var aB='all',ps=null;
function render(search){
  ps=null;
  var list=document.getElementById('pl');list.innerHTML='';
  var s=(search||'').toLowerCase().trim();
  var groups=[];var cur=null;
  D.forEach(function(e){
    if(e.type==='brand'){cur=Object.assign({},e,{ch:[]});groups.push(cur)}
    else if(cur)cur.ch.push(e);
  });
  groups.forEach(function(g){
    if(aB!=='all'&&g.name!==aB)return;
    var mi=g.ch.filter(function(x){return x.type==='item'&&(!s||x.name.toLowerCase().includes(s))});
    if(!mi.length)return;
    var sec=document.createElement('div');sec.className='bs';
    var hdr=document.createElement('div');hdr.className='bh';hdr.style.background=g.color;
    hdr.innerHTML=g.name+'<span class="ar">▾</span>';
    var body=document.createElement('div');body.className='bi';
    hdr.onclick=function(){hdr.classList.toggle('cl');body.classList.toggle('cl')};
    sec.appendChild(hdr);
    var ls=null;
    g.ch.forEach(function(ch){
      if(ch.type==='sub'){ls=ch.name;return}
      if(s&&!ch.name.toLowerCase().includes(s))return;
      if(ls&&ls!==ps){var sh=document.createElement('div');sh.className='sh';sh.textContent=ls;body.appendChild(sh);ps=ls}
      var p30=gp(ch,30),p60=gp(ch,60),p100=gp(ch,100);
      var row=document.createElement('div');row.className='pi';row.id='r'+ch._id;
      if(qty[ch._id]>0)row.classList.add('hq');
      row.innerHTML='<div class="pin"><div class="pn">'+ch.name+'</div>'
        +'<div class="pp"><span class="rr">'+ch.price.toLocaleString('ru')+' ₽</span>'
        +'<span class="po p30">30т: '+p30.toLocaleString('ru')+'</span>'
        +'<span class="po p60">60т: '+p60.toLocaleString('ru')+'</span>'
        +'<span class="po p100">100т: '+p100.toLocaleString('ru')+'</span>'
        +'</div></div>'
        +'<div class="qc">'
        +'<button class="qb m" onclick="chg('+ch._id+',-1)">−</button>'
        +'<input class="qi" id="q'+ch._id+'" type="number" min="0" value="'+qty[ch._id]+'" onchange="sq('+ch._id+',this.value)">'
        +'<button class="qb p" onclick="chg('+ch._id+',1)">+</button>'
        +'</div>';
      body.appendChild(row);
    });
    sec.appendChild(body);list.appendChild(sec);
  });
}
function flt(){render(document.getElementById('sri').value)}
function fb(b,el){
  aB=b;
  document.querySelectorAll('.cp').forEach(function(c){c.classList.remove('ac');c.style.background='';c.style.borderColor='';c.style.color=''});
  el.classList.add('ac');
  var rb=RB.find(function(x){return x.name===b});
  var col=b==='all'?'#1a1a2e':(rb?rb.color:'#444');
  el.style.background=col;el.style.borderColor=col;el.style.color='#fff';
  render(document.getElementById('sri').value);
}
RB.forEach(function(b){
  var c=document.createElement('div');c.className='cp';
  c.textContent=b.name.replace(/ PROFESSIONAL/g,'').replace(/ PROFISSIONAL/g,'').replace(/БРАЗИЛЬСКАЯ КОСМЕТИКА.*/,'БРАЗИЛИЯ 1L');
  c.onclick=function(){fb(b.name,c)};
  document.getElementById('cps').appendChild(c);
});

function bldTxt(name,contact,ordered,l,tot,b){
  var disc=l?'ОПТ'+l+'тр':'без скидки';
  var lines=[];
  if(name)lines.push('👤 '+name);
  if(contact)lines.push('📞 '+contact);
  lines.push('📅 '+new Date().toLocaleDateString('ru'),'','📦 ПОЗИЦИИ:');
  ordered.forEach(function(it){
    var op=l?gp(it,l):it.price;
    lines.push('• '+it.name+' — '+qty[it._id]+' шт × '+op.toLocaleString('ru')+' ₽ = '+(op*qty[it._id]).toLocaleString('ru')+' ₽');
  });
  lines.push('','💰 РРЦ: '+b.toLocaleString('ru')+' ₽');
  lines.push('🏷️ Скидка: '+disc);
  lines.push('✅ К ОПЛАТЕ: '+tot.toLocaleString('ru')+' ₽');
  return lines.join('\n');
}

function sendTG(){window.open('https://t.me/share/url?url=&text='+encodeURIComponent(_orderTxt),'_blank')}
function sendWA(){window.open('https://wa.me/?text='+encodeURIComponent(_orderTxt),'_blank')}
function cpTxt(){
  if(navigator.clipboard){
    navigator.clipboard.writeText(_orderTxt).then(function(){alert('Скопировано!')}).catch(function(){fb2()})
  }else{fb2()}
  function fb2(){var ta=document.createElement('textarea');ta.value=_orderTxt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Скопировано!')}
}

function openM(){
  var b=base(),l=lv(),tot=totOpt(l);
  var name=document.getElementById('cn').value.trim();
  var contact=document.getElementById('cc').value.trim();
  var ordered=items.filter(function(it){return qty[it._id]>0});
  if(!ordered.length)return;
  _orderTxt=bldTxt(name,contact,ordered,l,tot,b);
  var html='';
  if(name)html+='<div class="csum">👤 '+name+(contact?' · '+contact:'')+'</div>';
  html+='<h2>Заказ ('+ordered.length+' позиций)</h2>';
  ordered.forEach(function(it){
    var op=l?gp(it,l):it.price;
    html+='<div class="oi"><div><div class="on">'+it.name+'</div>'
      +'<div class="od">'+it.price.toLocaleString('ru')+' ₽ × '+qty[it._id]+' шт → '+op.toLocaleString('ru')+' ₽/шт</div></div>'
      +'<div class="ot">'+(op*qty[it._id]).toLocaleString('ru')+' ₽</div></div>';
  });
  var dtext=l?'Скидка ОПТ'+l+'тр':'Без скидки';
  html+='<div class="mt">'
    +'<div class="mr"><span>РРЦ (без скидки)</span><span>'+b.toLocaleString('ru')+' ₽</span></div>'
    +'<div class="mr"><span>'+dtext+'</span><span>−'+(b-tot).toLocaleString('ru')+' ₽</span></div>'
    +'<div class="mr fn"><span>К оплате</span><span>'+tot.toLocaleString('ru')+' ₽</span></div>'
    +'</div>';
  html+='<button class="sb tg" onclick="sendTG()">📱 Отправить в Telegram</button>';
  html+='<button class="sb wa" onclick="sendWA()">💬 Отправить в WhatsApp</button>';
  html+='<button class="sb cp2" onclick="cpTxt()">📋 Скопировать текст заказа</button>';
  document.getElementById('mc').innerHTML=html;
  document.getElementById('ov').classList.add('op');
}
function clM(){document.getElementById('ov').classList.remove('op')}
function ocl(e){if(e.target===document.getElementById('ov'))clM()}
render('');
</script>
